# CERG configuration for the RRR 3-link planar arm
# All robot-specific tuning parameters live here.

# ─── Controller gains ───
# Used by BOTH the actual PD controller AND the CERG prediction loop.
Kp: [100.0, 100.0, 100.0]
Kd: [20.0, 20.0, 20.0]

# ─── Joint velocity limits (symmetric: [-qd_max, qd_max]) ───
qd_limits: [5.0, 5.0, 5.0]

# ─── CERG prediction ───
prediction_dt: 0.01        # timestep for Euler integration in predictions
prediction_horizon: 0.2    # how far ahead to predict (seconds)
erg_dt: 0.01               # timestep for the auxiliary reference ODE

# ─── Navigation field ───
eta: 0.005                 # epsilon for division-by-zero avoidance
zeta_q: 0.15               # influence range for joint limit repulsion
delta_q: 0.1               # threshold for joint limit repulsion activation
delta_s: 0.1               # safety distance for soft constraint repulsion
fd: 1.0                    # force damping for soft navigation field
zeta_w: 0.15               # influence range for hard constraint repulsion
delta_w: 0.1               # threshold for hard constraint repulsion activation

# ─── DSM robustness margins (subtracted from raw distance) ───
robust_delta_tau: 0.0
robust_delta_q: 0.0
robust_delta_dq: 0.0

# ─── DSM scaling factors (kappa) ───
kappa_tau: 1.0
kappa_q: 1.0
kappa_dq: 1.0
kappa_soft: 1.0             # scaling for soft constraint DSM
kappa_hard: 1.0             # scaling for hard constraint DSM
kappa_energy: 1.0

# ─── Energy constraint ───
E_max: 5.0
